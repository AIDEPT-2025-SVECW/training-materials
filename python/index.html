<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🐍 Python for Data Science</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #306998 0%, #ffd43b 100%);
      min-height: 100vh;
      padding: 28px;
    }

    .container {
      max-width: 980px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .header {
      padding: 28px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff;
      text-align: center;
    }

    .content {
      display: flex;
      gap: 20px;
      padding: 28px;
      flex-wrap: wrap;
    }

    .left {
      width: 300px;
    }

    .right {
      flex: 1;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .topic-title {
      font-size: 1.3rem;
      color: #1e40af;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      padding: 12px;
      border-radius: 8px;
      background: #f8fafc;
      display: flex;
      justify-content: space-between;
    }

    li.clickable:hover {
      transform: translateX(5px);
      cursor: pointer;
    }

    a {
      text-decoration: none;
      color: #111;
      font-weight: 600;
    }

    .disabled {
      color: #9ca3af;
    }

    .meta {
      font-size: 0.8rem;
      color: #64748b;
    }

    .github {
      margin-top: 15px;
      padding: 10px;
      background: #eef2ff;
      border-left: 4px solid #3b82f6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🐍 Python for Data Science</h1>
      <p>Interactive learning path for theory + practical</p>
    </div>

    <div class="content">
      <div class="left panel">
        <label>Select Topic</label>
        <select id="topicSelect">
          <option value="">-- Select Topic --</option>
        </select>
      </div>

      <div class="right panel" id="subtopicsArea">
        <p>Select a topic to explore</p>
      </div>
    </div>
  </div>

  <script>
    const READY_TOPICS = ["python-basics", "data-structures", "numpy", "pandas"];

    const TOPICS = {
      "python-basics": {
        title: "Python Fundamentals",
        subtopics: [
          { title: "Introduction to Python", file: "introduction.html" },
          {
            title: "Variables and Data Types",
            file: "variables-data-types.html",
          },
          { title: "Operators", file: "operators.html" },
          { title: "Control Statements", file: "control-statements.html" },
          { title: "Functions", file: "functions.html" },
          { title: "Modules & Packages", file: "modules-packages.html" },
          { title: "File Handling", file: "file-handling.html" },
          { title: "Exception Handling", file: "exception-handling.html" },
        ],
        github: "https://github.com/pradeepjuluri143/python-basics",
      },

      "data-structures": {
        title: "Python Data Structures",
        subtopics: [
          { title: "Lists", file: "lists.html" },
          { title: "Tuples", file: "tuples.html" },
          { title: "Sets", file: "sets.html" },
          { title: "Dictionaries", file: "dictionaries.html" },
          { title: "Comprehensions", file: "comprehensions.html" },
          {
            title: "Iterators & Generators",
            file: "iterators-generators.html",
          },
        ],
        github: "",
      },

      numpy: {
        title: "NumPy",
        subtopics: [
          { title: "Introduction to NumPy", file: "introduction.html" },
          { title: "ndarray Basics", file: "ndarray.html" },
          { title: "Indexing & Slicing", file: "indexing-slicing.html" },
          { title: "Broadcasting", file: "broadcasting.html" },
          { title: "Mathematical Operations", file: "math-operations.html" },
          { title: "Linear Algebra (Optional)", file: "linear-algebra.html" },
        ],
        github: "",
      },

      pandas: {
        title: "Pandas",
        subtopics: [
          { title: "Series & DataFrame", file: "series-dataframe.html" },
          { title: "Data Cleaning", file: "data-cleaning.html" },
          { title: "Handling Missing Data", file: "missing-data.html" },
          {
            title: "Grouping & Aggregation",
            file: "groupby-aggregation.html",
          },
          { title: "Merging & Joining", file: "merge-join.html" },
          { title: "Time Series (Optional)", file: "time-series.html" },
        ],
        github: "",
      },

      visualization: {
        title: "Data Visualization",
        subtopics: [
          { title: "Matplotlib Basics", file: "matplotlib-basics.html" },
          { title: "Seaborn", file: "seaborn.html" },
          { title: "Line, Bar, Pie Charts", file: "charts.html" },
          { title: "Customization", file: "customization.html" },
          {
            title: "Interactive Plots - Optional",
            file: "interactive-plots.html",
          },
        ],
        github: "",
      },

      eda: {
        title: "Exploratory Data Analysis",
        subtopics: [
          {
            title: "Understanding Dataset",
            file: "understanding-dataset.html",
          },
          { title: "Summary Statistics", file: "summary-statistics.html" },
          {
            title: "Correlation Analysis",
            file: "correlation-analysis.html",
          },
          { title: "Feature Engineering", file: "feature-engineering.html" },
          { title: "Outlier Detection", file: "outlier-detection.html" },
        ],
        github: "",
      },

      "ml-basics": {
        title: "Machine Learning Basics",
        subtopics: [
          {
            title: "Introduction to Machine Learning",
            file: "introduction.html",
          },
          {
            title: "Supervised vs Unsupervised",
            file: "supervised-vs-unsupervised.html",
          },
          { title: "Regression", file: "regression.html" },
          { title: "Classification", file: "classification.html" },
          { title: "Model Evaluation", file: "model-evaluation.html" },
          {
            title: "Overfitting & Underfitting",
            file: "overfitting-underfitting.html",
          },
        ],
        github: "",
      },

      projects: {
        title: "Mini Projects",
        subtopics: [
          {
            title: "Data Analysis Project",
            file: "data-analysis-project.html",
          },
          { title: "Visualization Dashboard", file: "dashboard.html" },
          { title: "Machine Learning Project", file: "ml-project.html" },
          { title: "Deployment - Optional", file: "deployment.html" },
        ],
        github: "",
      },
    };

    const topicSelect = document.getElementById("topicSelect");
    const area = document.getElementById("subtopicsArea");

    function populate() {
      Object.keys(TOPICS).forEach((k) => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = TOPICS[k].title;
        topicSelect.appendChild(opt);
      });
    }

    function render(id) {
      area.innerHTML = "";
      if (!id) return;

      const topic = TOPICS[id];
      const isReady = READY_TOPICS.includes(id);

      let title = document.createElement("div");
      title.className = "topic-title";
      title.textContent = topic.title;
      area.appendChild(title);

      let ul = document.createElement("ul");

      topic.subtopics.forEach((s) => {
        let li = document.createElement("li");

        const optional = s.title.toLowerCase().includes("- optional");
        const optionalFlg = s.title.toLowerCase().includes("optional");
        const href = `${id}/${s.file}`;

        if (isReady && !optional) {
          li.classList.add("clickable");
          if (optionalFlg) {
            li.innerHTML = `<a href="${href}" target="_blank">${s.title}</a><span class="meta">Optional</span>`;
          } else {
            li.innerHTML = `<a href="${href}" target="_blank">${s.title}</a><span class="meta">Core</span>`;
          }
          li.onclick = () => window.open(href, "_blank");

        } else {
          li.innerHTML = `<span class="disabled">${s.title}</span><span class="meta">${optional ? "Optional" : "Locked"}</span>`;
        }

        ul.appendChild(li);
      });

      area.appendChild(ul);

      if (topic.github) {
        let gh = document.createElement("div");
        gh.className = "github";
        gh.innerHTML = `<strong>GitHub:</strong> <a href="${topic.github}" target="_blank">${topic.github}</a>`;
        area.appendChild(gh);
      }
    }

    populate();
    topicSelect.addEventListener("change", (e) => render(e.target.value));
  </script>
</body>

</html>
