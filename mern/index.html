<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>⚛️ MERN Stack Development</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      padding: 28px;
    }

    .container {
      max-width: 980px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .header {
      padding: 28px;
      background: linear-gradient(135deg, #020617, #339933);
      color: #fff;
      text-align: center;
    }

    .content {
      display: flex;
      gap: 20px;
      padding: 28px;
      flex-wrap: wrap;
    }

    .left {
      width: 300px;
    }

    .right {
      flex: 1;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .topic-title {
      font-size: 1.3rem;
      color: #0f172a;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      padding: 12px;
      border-radius: 8px;
      background: #f8fafc;
      display: flex;
      justify-content: space-between;
    }

    li.clickable:hover {
      transform: translateX(5px);
      cursor: pointer;
    }

    a {
      text-decoration: none;
      color: #111;
      font-weight: 600;
    }

    .disabled {
      color: #9ca3af;
    }

    .meta {
      font-size: 0.8rem;
      color: #64748b;
    }

    .github {
      margin-top: 15px;
      padding: 10px;
      background: #eef2ff;
      border-left: 4px solid #3b82f6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>⚛️ MERN Stack Development</h1>
      <p>Interactive learning path for MongoDB, Express, React, and Node.js</p>
    </div>

    <div class="content">
      <div class="left panel">
        <label>Select Topic</label>
        <select id="topicSelect">
          <option value="">-- Select Topic --</option>
        </select>
      </div>

      <div class="right panel" id="subtopicsArea">
        <p>Select a topic to explore</p>
      </div>
    </div>
  </div>

  <script>
    const READY_TOPICS = ["overview", "typescript", "expressjs", "mongodb-rest", "react-fundamentals", "advanced-react"];

    const TOPICS = {
      "overview": {
        title: "Overview",
        subtopics: [
          { title: "Intro to MERN, HTTP Basics", file: "intro-mern.html" }
        ],
        github: ""
      },
      "typescript": {
        title: "TypeScript",
        subtopics: [
          {
            type: "group",
            title: "JavaScript Recap (Optional)",
            items: [
              { title: "JS Evolution Demo", file: "../../JavaScript/js-evolution-demo.html" },
              { title: "JS Engine Visualizer", file: "../../JavaScript/js_engine_visualizer.html" },
              { title: "JS Syntax Fundamentals", file: "../../NodeJS/js-recap/js-syntax-fundamentals.html" },
              { title: "ES6 Features Demo", file: "../../NodeJS/js-recap/es6_features_demo.html" },
              { title: "Closures & Lexical Scoping Demo", file: "../../NodeJS/js-recap/closures-lexical-scoping-demo.html" },
              { title: "JS Prototypes Demo", file: "../../NodeJS/js-recap/js_prototypes_demo.html" },
              { title: "Promises & Async/Await Demo", file: "../../NodeJS/js-recap/promises-async-demo.html" },
              { title: "JS Error Handling Demo", file: "../../NodeJS/js-recap/js-error-handling-demo.html" }
            ]
          },
          { title: "Introduction to TypeScript", file: "intro-typescript.html" },
          { title: "Setup & Hello World (Practical)", file: "ts-setup-hello-world.html" },
          { title: "Compilation and Type Inference", file: "compilation.html" },
          { title: "Primitive and Special Types", file: "types.html" },
          { title: "Union, Intersection, and Literal Types", file: "union-intersection.html" },
          { title: "Interfaces and Type Aliases", file: "interfaces-aliases.html" },
          { title: "Function Types, Signatures, Parameters & Arrow Functions", file: "functions.html" },
          { title: "Lexical 'this' Deep Dive - Opt", file: "lexical-this.html" },
          { title: "Classes, Constructors, and Access Specifiers", file: "classes-objects.html" },
          { title: "Type Assertions and DOM Manipulation - Opt", file: "dom-manipulation.html" },
          { title: "Modules & Namespaces", file: "modules-namespace.html" },
          { title: "Generics", file: "generics.html" }
        ],
        github: ""
      },
      "expressjs": {
        title: "ExpressJS Basics",
        subtopics: [
          {
            type: "group",
            title: "Introduction to Node.js",
            items: [
              { title: "What is Node.js and why use it?", file: "../../NodeJS/nodejs-intro/nodejs_intro.html" },
              { title: "Browser JS vs Node JS", file: "../../NodeJS/nodejs-intro/browservsNodejs.html" },
              { title: "MEAN & MERN", file: "../../NodeJS/nodejs-intro/mern_mean_demo.html" },
              { title: "Node.js architecture and event loop", file: "../../NodeJS/nodejs-intro/nodejs_arch_imp_concepts.html" },
              { title: "Running JavaScript outside the browser", file: "../../NodeJS/nodejs-intro/js-outside-browser.html" },
              { title: "Global objects in Node.js", file: "../../NodeJS/nodejs-intro/nodejs_globals.html" },
              { title: "IO Heavy Vs Compute Heavy Applications Intro", file: "../../NodeJS/nodejs-intro/io-vs-compute-demo.html" }
            ]
          },
          { title: "Event Loop, Modules and Package Management", file: "event-loop.html" },
          { title: "ExpressJS Architecture, Installation", file: "expressjs-architecture.html" },
          { title: "HTTP Methods (GET, POST, PUT, DELETE)", file: "http-methods.html" },
          { title: "Routing Concepts in ExpressJS", file: "routing.html" },
          { title: "Route Parameters and Query Parameters", file: "route-query-params.html" },
          { title: "Middleware and Middleware Pipeline", file: "middleware.html" },
          { title: "Templating Engines (EJS)", file: "templating-engines.html" },
          { title: "Form Handling and Validation", file: "form-handling.html" }
        ],
        github: ""
      },
      "mongodb-rest": {
        title: "Authentication, MongoDB & REST APIs",
        subtopics: [
          { title: "Cookies Fundamentals", file: "cookies.html" },
          { title: "Sessions and Session Management", file: "sessions.html" },
          { title: "Session Lifecycle and Security", file: "session-lifecycle.html" },
          { title: "Authentication Concepts", file: "authentication.html" },
          { title: "Login and Logout Mechanisms", file: "login-logout.html" },
          { title: "Authorization and Access Control", file: "authorization.html" },
          { title: "MongoDB Overview and NoSQL Concepts", file: "mongodb-overview.html" },
          { title: "MongoDB Installation and Atlas Configuration", file: "mongodb-installation.html" },
          { title: "Databases, Collections and Documents", file: "databases-collections.html" },
          { title: "Mongoose Introduction", file: "mongoose-intro.html" },
          { title: "CRUD Operations using Mongoose", file: "mongoose-crud.html" },
          { title: "RESTful API Design Principles", file: "rest-api-design.html" }
        ],
        github: ""
      },
      "react-fundamentals": {
        title: "ReactJS Fundamentals",
        subtopics: [
          { title: "ReactJS Introduction and SPA Concepts", file: "react-intro.html" },
          { title: "React Environment Setup (Vite)", file: "react-setup.html" },
          { title: "JSX Fundamentals", file: "jsx.html" },
          { title: "Functional Components", file: "functional-components.html" },
          { title: "Class Components", file: "class-components.html" },
          { title: "Component Composition and Reusability", file: "component-composition.html" },
          { title: "Props in ReactJS", file: "props.html" },
          { title: "State Management", file: "state-management.html" },
          { title: "Styling and Event Handling", file: "styling-events.html" }
        ],
        github: ""
      },
      "advanced-react": {
        title: "Advanced ReactJS & Applications",
        subtopics: [
          { title: "Conditional Rendering", file: "conditional-rendering.html" },
          { title: "Rendering Lists", file: "rendering-lists.html" },
          { title: "React Forms", file: "react-forms.html" },
          { title: "React Router Fundamentals", file: "react-router.html" },
          { title: "Route Configuration", file: "route-configuration.html" },
          { title: "Navigation Between Components", file: "navigation.html" },
          { title: "Introduction to React Hooks", file: "intro-hooks.html" },
          { title: "useState Hook", file: "usestate.html" },
          { title: "useEffect Hook", file: "useeffect.html" },
          { title: "Component Communication", file: "component-communication.html" },
          { title: "Lifting State Up", file: "lifting-state.html" },
          { title: "Sharing Data Between Components", file: "sharing-data.html" },
          { title: "MERN Stack Architecture Overview", file: "mern-architecture.html" },
          { title: "Project Integration Strategy", file: "project-integration.html" }
        ],
        github: ""
      }
    };

    const topicSelect = document.getElementById("topicSelect");
    const area = document.getElementById("subtopicsArea");

    function populate() {
      Object.keys(TOPICS).forEach((k) => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = TOPICS[k].title;
        topicSelect.appendChild(opt);
      });
    }

    function render(id) {
      area.innerHTML = "";
      if (!id) return;

      const topic = TOPICS[id];
      const isReady = READY_TOPICS.includes(id);

      let title = document.createElement("div");
      title.className = "topic-title";
      title.textContent = topic.title;
      area.appendChild(title);

      let ul = document.createElement("ul");

      topic.subtopics.forEach((s) => {
        if (s.type === "group") {
          let li = document.createElement("li");
          li.style.display = "block";
          li.style.padding = "0";
          li.style.background = "transparent";

          let details = document.createElement("details");
          details.style.background = "#f8fafc";
          details.style.borderRadius = "8px";
          details.style.padding = "12px";

          const optionalGroup = s.title && s.title.toLowerCase().includes("optional");
          const groupMeta = optionalGroup ? `<span class="meta" style="float:right">Optional Group</span>` : `<span class="meta" style="float:right">Core Group</span>`;

          let summary = document.createElement("summary");
          summary.style.cursor = "pointer";
          summary.style.fontWeight = "600";
          summary.innerHTML = `${s.title} ${groupMeta}`;
          details.appendChild(summary);

          let groupUl = document.createElement("ul");
          groupUl.style.marginTop = "10px";

          s.items.forEach(item => {
            let itemLi = document.createElement("li");
            const href = `${id}/${item.file}`;
            itemLi.classList.add("clickable");
            itemLi.style.background = "#fff";
            
            const itemOptional = item.title && item.title.toLowerCase().includes("optional");
            const itemMeta = (optionalGroup || itemOptional) ? `<span class="meta">Optional</span>` : `<span class="meta">Core</span>`;

            itemLi.innerHTML = `<a href="${href}" target="_blank">${item.title}</a>${itemMeta}`;
            itemLi.onclick = () => window.open(href, "_blank");
            groupUl.appendChild(itemLi);
          });

          details.appendChild(groupUl);
          li.appendChild(details);
          ul.appendChild(li);
          return;
        }

        let li = document.createElement("li");

        const optional = s.title && s.title.toLowerCase().includes("- optional");
        const optionalFlg = s.title && s.title.toLowerCase().includes("optional");
        const href = `${id}/${s.file}`;

        if (isReady && !optional) {
          li.classList.add("clickable");
          if (optionalFlg) {
            li.innerHTML = `<a href="${href}" target="_blank">${s.title}</a><span class="meta">Optional</span>`;
          } else {
            li.innerHTML = `<a href="${href}" target="_blank">${s.title}</a><span class="meta">Core</span>`;
          }
          li.onclick = () => window.open(href, "_blank");

        } else {
          li.innerHTML = `<span class="disabled">${s.title}</span><span class="meta">${optional ? "Optional" : "Locked"}</span>`;
        }

        ul.appendChild(li);
      });

      area.appendChild(ul);

      if (topic.github) {
        let gh = document.createElement("div");
        gh.className = "github";
        gh.innerHTML = `<strong>GitHub:</strong> <a href="${topic.github}" target="_blank">${topic.github}</a>`;
        area.appendChild(gh);
      }
    }

    populate();
    topicSelect.addEventListener("change", (e) => render(e.target.value));
  </script>
</body>

</html>
